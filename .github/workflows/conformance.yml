name: conformance

# Cross-impl differential: builds BOTH engines from their main branches and asserts they infer the
# spec-mandated effect set on the shared fixtures (conformance/run.sh). A DIVERGE row = a bug in one
# engine; a BOTH-OFF row = both disagree with the spec. Runs on every change to candor-spec, and can be
# dispatched manually after a classifier change lands in either engine.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  cross-impl-differential:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout candor-spec
        uses: actions/checkout@v6
        with:
          path: candor-spec
      # The two engines are public sibling repos, checked out next to candor-spec so run.sh's default
      # sibling layout (and the explicit CANDOR/CANDOR_JAVA below) resolves them.
      - name: Checkout candor (Rust engine)
        uses: actions/checkout@v6
        with:
          repository: tombaldwin/candor-rust
          path: candor
      - name: Checkout candor-java (JVM engine)
        uses: actions/checkout@v6
        with:
          repository: tombaldwin/candor-java
          path: candor-java

      # candor-scan is the STABLE backend — no nightly needed (run.sh builds it with `-p candor-scan`,
      # which never touches the rustc_private lint crate).
      - uses: dtolnay/rust-toolchain@stable
      - name: Clone candor-ts (third engine)
        run: git clone --depth 1 https://github.com/tombaldwin/candor-ts candor-ts || echo "candor-ts unavailable — Part 6 will skip"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            candor/target
          key: ${{ runner.os }}-conformance-cargo-${{ hashFiles('candor/Cargo.lock') }}
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-conformance-gradle-${{ hashFiles('candor-java/**/*.gradle.kts', 'candor-java/gradle/wrapper/gradle-wrapper.properties') }}

      - name: Cross-impl conformance differential
        run: |
          CANDOR="$GITHUB_WORKSPACE/candor" \
          CANDOR_JAVA="$GITHUB_WORKSPACE/candor-java" \
          CANDOR_TS="$GITHUB_WORKSPACE/candor-ts" \
            bash "$GITHUB_WORKSPACE/candor-spec/conformance/run.sh"
